<!DOCTYPE html>
<html lang="{{ site.Language.Lang | default "en" }}" dir="{{ .Language.LanguageDirection | default "auto" }}">
<head>
  {{- partial "head.html" . -}}
</head>
<body id="top" class="site-body {{ if .IsHome }}is-home{{ else if eq .Kind "page" }}is-page{{ else }}is-list{{ end }}">
  {{- partial "header.html" . -}}
  <main class="site-shell site-main">
    {{- block "main" . }}{{ end -}}
  </main>
  {{- partial "footer.html" . -}}
</body>
</html>
